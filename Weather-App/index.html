<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="search">
            <input type="search" class="search-bar" placeholder="Enter the city name...">
            <button class="search-icon">
                <img src="./images/search.png" alt="search-icon" width="20px">
            </button>
        </div>
        <div class="weather-content">
            <img src="./images/clouds.png" alt="image" width="160px" class="weather-image">
            <div class="weather-info">
                <div class="degree">22&deg;C</div>
                <div class="city">New York</div>
            </div>
        </div>
        <div class="weather-description">
            <div class="humidity">
                <img src="./images/humidity.png" alt="image" width="45px">
                <div class="humidity-details">
                    <p class="humidity-value">50%</p>
                    <p>Humidity</p>
                </div>
            </div>
            <div class="wind">
                <img src="./images/wind.png" alt="images" width="45px">
                <div class="wind-details">
                    <p class="wind-speed">15km/hr</p>
                    <p>Wind Speed</p>
                </div>
            </div>
        </div>
    </div>
    <script>
        const apiKey = "4253f7de2f06c4a0aa33192e9ba9adc8";
        const apiUrl = "https://api.openweathermap.org/data/2.5/weather?units=metric&q=";

        const searchBox = document.querySelector(".search-bar");
        const searchBtn = document.querySelector(".search-icon");
        const weatherIcon = document.querySelector(".weather-image");

        async function checkWeather(city) {
                const response = await fetch(apiUrl  + city + `&appid=${apiKey}`);
                var data = await response.json();

                document.querySelector(".city").innerHTML = data.name;
                document.querySelector(".degree").innerHTML = Math.round(data.main.temp) + `&deg;C`;
                document.querySelector(".humidity-value").innerHTML = data.main.humidity + "%";
                document.querySelector(".wind-speed").innerHTML = data.wind.speed + " km/hr"; 

                if(data.weather[0].main == "Rain"){
                    weatherIcon.src = "./images/rain.png";
                }
                else if(data.weather[0].main == "Clouds"){
                    weatherIcon.src = "./images/clouds.png";
                }
                else if(data.weather[0].main == "Drizzle"){
                    weatherIcon.src = "./images/drizzle.png";
                }
                else if(data.weather[0].main == "Snow"){
                    weatherIcon.src = "./images/snow.png";
                }
                else if(data.weather[0].main == "Mist"){
                    weatherIcon.src = "./images/mist.png";
                }
                else if(data.weather[0].main == "Clear"){
                    weatherIcon.src = "./images/clear.png"
                }
        }

        searchBtn.addEventListener("click", () => {
            checkWeather(searchBox.value);

        })

    </script>
</body>
</html>
